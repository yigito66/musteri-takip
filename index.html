<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yiğido Müşteri Sistemi</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

/* LOGIN */
.center{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:320px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.kayit{background:#22c55e;color:white;}
.giris{background:#3b82f6;color:white;}

/* PANEL */
.panel{
    display:none;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.add{background:#22c55e;color:white;}
.wp{background:#25D366;color:white;}
.del{background:#ef4444;color:white;}

.musteri{
    background:#334155;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
<div class="box">
<h2>Giriş</h2>

<input id="u" placeholder="Kullanıcı adı">
<input id="p" type="password" placeholder="Şifre">

<button class="kayit" onclick="kayit(u.value,p.value)">Kayıt Ol</button>
<button class="giris" onclick="giris(u.value,p.value)">Giriş Yap</button>

</div>
</div>

<!-- PANEL -->
<div id="panel" class="panel">

<div class="card">
<h2>Müşteri Ekle</h2>

<input id="ad" placeholder="Ad Soyad">
<input id="tel" placeholder="Telefon (Başına 90 yazıp numarayı yazınız)">
<input id="borc" placeholder="Borç">
<textarea id="not" placeholder="Not"></textarea>

<button class="add" onclick="ekle()">Ekle</button>
</div>

<div class="card">
<h2>Müşteriler</h2>
<div id="liste"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8BbnrGzsljYnsUV5pqROzQL--C686n_0",
  authDomain: "musteri-sistem.firebaseapp.com",
  projectId: "musteri-sistem",
  storageBucket: "musteri-sistem.firebasestorage.app",
  messagingSenderId: "856410939016",
  appId: "1:856410939016:web:5b929ed65a3dab8a90893d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const mail = (u)=> u + "@app.local";

/* LOGIN */
window.kayit = function(u,p){
createUserWithEmailAndPassword(auth, mail(u), p)
.then(()=>alert("Kayıt başarılı"))
.catch(e=>alert(e.message));
}

window.giris = function(u,p){
signInWithEmailAndPassword(auth, mail(u), p)
.then(()=>{
    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";
})
.catch(()=>alert("Hatalı giriş"));
}

/* CRM */
let musteriler = JSON.parse(localStorage.getItem("musteriler")) || [];

window.ekle = function(){

let ad = document.getElementById("ad").value;
let tel = document.getElementById("tel").value;
let borc = document.getElementById("borc").value;
let not = document.getElementById("not").value;

musteriler.push({ad,tel,borc,not});
localStorage.setItem("musteriler", JSON.stringify(musteriler));

goster();
}

window.goster = function(){

let liste = document.getElementById("liste");
liste.innerHTML = "";

musteriler.forEach((m,i)=>{

let mesaj = `Merhaba ${m.ad}, borcunuz ${m.borc} TL`;

liste.innerHTML += `
<div class="musteri">
<b>${m.ad}</b><br>
Telefon: ${m.tel}<br>
Borç: ${m.borc}<br>
Not: ${m.not}

<button class="wp"
onclick="window.open('https://wa.me/${m.tel}?text=${encodeURIComponent(mesaj)}')">
WhatsApp
</button>

<button class="del" onclick="sil(${i})">
Sil
</button>

</div>
`;

});

}

window.sil = function(i){
musteriler.splice(i,1);
localStorage.setItem("musteriler", JSON.stringify(musteriler));
goster();
}

goster();

</script>

</body>
</html>

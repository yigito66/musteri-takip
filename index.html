<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müşteri Sistem</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.kayit{background:#22c55e;color:white;}
.giris{background:#3b82f6;color:white;}
</style>
</head>

<body>

<div class="box">
<h2>Giriş Sistemi</h2>

<input id="u" placeholder="Kullanıcı adı">
<input id="p" type="password" placeholder="Şifre">

<button class="kayit" onclick="kayit(u.value,p.value)">Kayıt Ol</button>
<button class="giris" onclick="giris(u.value,p.value)">Giriş Yap</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8BbnrGzsljYnsUV5pqROzQL--C686n_0",
  authDomain: "musteri-sistem.firebaseapp.com",
  projectId: "musteri-sistem",
  storageBucket: "musteri-sistem.firebasestorage.app",
  messagingSenderId: "856410939016",
  appId: "1:856410939016:web:5b929ed65a3dab8a90893d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// username → fake email
function toEmail(u){
  return u + "@app.local";
}

// KAYIT
window.kayit = function(username, password){

  createUserWithEmailAndPassword(auth, toEmail(username), password)
  .then(()=>{
      alert("Kayıt başarılı");
  })
  .catch(e=>{
      alert(e.message);
  });

}

// GİRİŞ
window.giris = function(username, password){

  signInWithEmailAndPassword(auth, toEmail(username), password)
  .then(()=>{
      alert("Giriş başarılı");
      document.body.innerHTML = "<h1 style='color:white'>Giriş yaptın 🎉</h1>";
  })
  .catch(()=>{
      alert("Hatalı giriş");
  });

}

</script>

</body>
</html>

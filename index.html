<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Müşteri Sistem</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    margin:0;
}

.center{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    width:320px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.kayit{background:#22c55e;color:white;}
.giris{background:#3b82f6;color:white;}

.hidden{display:none;}

.panel{
    padding:20px;
}

.musteri{
    background:#334155;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
<div class="box">
<h2>Giriş Sistemi</h2>

<input id="u" placeholder="Kullanıcı adı">
<input id="p" type="password" placeholder="Şifre">

<button class="kayit" onclick="kayit(u.value,p.value)">Kayıt Ol</button>
<button class="giris" onclick="giris(u.value,p.value)">Giriş Yap</button>
</div>
</div>

<!-- PANEL -->
<div id="panel" class="hidden">

<div style="padding:20px;">

<h2>Müşteri Ekle</h2>

<input id="ad" placeholder="Ad Soyad">
<input id="borc" type="number" placeholder="Borç">
<textarea id="not" placeholder="Not"></textarea>

<button onclick="ekle()">Ekle</button>

<hr>

<h2>Müşteriler</h2>
<div id="liste"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8BbnrGzsljYnsUV5pqROzQL--C686n_0",
  authDomain: "musteri-sistem.firebaseapp.com",
  projectId: "musteri-sistem",
  storageBucket: "musteri-sistem.firebasestorage.app",
  messagingSenderId: "856410939016",
  appId: "1:856410939016:web:5b929ed65a3dab8a90893d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const mail = (u)=> u + "@app.local";

// LOGIN
window.kayit = function(u,p){
createUserWithEmailAndPassword(auth, mail(u), p)
.then(()=>alert("Kayıt başarılı"))
.catch(e=>alert(e.message));
}

window.giris = function(u,p){
signInWithEmailAndPassword(auth, mail(u), p)
.then(()=>{
    document.getElementById("login").style.display="none";
    document.getElementById("panel").classList.remove("hidden");
})
.catch(()=>alert("Hatalı giriş"));
}

// MÜŞTERİ
let musteriler = JSON.parse(localStorage.getItem("musteriler")) || [];

window.ekle = function(){

let ad = document.getElementById("ad").value;
let borc = document.getElementById("borc").value;
let not = document.getElementById("not").value;

musteriler.push({ad,borc,not});

localStorage.setItem("musteriler", JSON.stringify(musteriler));

goster();
}

window.goster = function(){

let liste = document.getElementById("liste");
liste.innerHTML = "";

musteriler.forEach(m=>{
liste.innerHTML += `
<div class="musteri">
<b>${m.ad}</b><br>
Borç: ${m.borc}<br>
Not: ${m.not}
</div>
`;
});

}

</script>

</body>
</html>
